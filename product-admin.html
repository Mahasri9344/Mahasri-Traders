<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Management</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

<div class="logo">
🌿 Mahasri Traders Admin
</div>

<nav>

<a href="admin.html">Orders</a>

<a href="index.html">Website</a>

</nav>

</header>

<section>

<h2>Add Product</h2>

<form id="productForm">

<input
type="text"
id="name"
placeholder="Product Name"
required>

<br><br>

<input
type="number"
id="price"
placeholder="Price"
required>

<br><br>

<input
type="text"
id="category"
placeholder="Category"
required>

<br><br>

<input
type="text"
id="image"
placeholder="Image URL"
required>

<br><br>

<input
type="number"
id="stock"
placeholder="Stock"
required>

<br><br>

<button type="submit">

Add Product

</button>

</form>

</section>

<section>

<h2>All Products</h2>

<div id="productsContainer"></div>

</section>
<script type="module" src="js/admin-auth.js"></script>
<script type="module" src="js/product-admin.js"></script>

</body>
</html>
