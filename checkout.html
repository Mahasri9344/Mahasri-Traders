<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="logo">
🌿 Mahasri Traders
</div>

<nav>

<a href="index.html">Home</a>

<a href="cart.html">Cart</a>

</nav>

</header>

<section>

<h2>Checkout</h2>

<form id="checkoutForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<br><br>

<input
type="tel"
id="phone"
placeholder="Phone Number"
required>

<br><br>

<input
type="email"
id="email"
placeholder="Email">

<br><br>

<textarea
id="address"
placeholder="Delivery Address"
required></textarea>

<br><br>

<select id="payment">

<option>Cash on Delivery</option>

<option>UPI</option>

</select>

<br><br>

<button type="submit">

Place Order

</button>

</form>

</section>
<script type="module" src="js/checkout.js"></script>

</body>
</html>
