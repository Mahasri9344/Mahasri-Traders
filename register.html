<section>

<h2>Create Account</h2>

<form id="registerForm">

<input
type="text"
id="name"
placeholder="Full Name"
required>

<br><br>

<input
type="email"
id="email"
placeholder="Email"
required>

<br><br>

type="password"
id="password"
placeholder="Password"
required>

<br><br>

<input
type="password"
id="confirmPassword"

required>

<br><br>

<button type="submit">

Register

</button>

</form>
